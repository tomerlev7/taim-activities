<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דיווח פעילויות שבועי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
    --text:#1a1a1a;--muted:#6b6b6b;--border:#e0ddd6;
    --bg:#faf9f7;--card:#ffffff;--radius:10px;
  }
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}
  h1{font-size:22px;font-weight:600;margin-bottom:4px}
  .subtitle{font-size:14px;color:var(--muted);margin-bottom:2rem}
  .container{max-width:560px;margin:0 auto}
  .header{margin-bottom:2rem}
  .week-badge{display:inline-block;background:var(--green-light);color:var(--green-dark);font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:1rem}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
  label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:0.02em}
  select,input[type=text],textarea{
    width:100%;font-family:'Heebo',sans-serif;font-size:14px;
    padding:9px 11px;border:1px solid var(--border);border-radius:8px;
    background:#fff;color:var(--text);outline:none;transition:border-color 0.15s;
  }
  select:focus,input:focus,textarea:focus{border-color:var(--green)}
  textarea{resize:vertical;min-height:72px;line-height:1.6}
  input[type=date]{cursor:pointer;direction:ltr;text-align:right}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  .sep{height:1px;background:var(--border);margin:1rem 0}
  details summary{
    font-size:13px;color:var(--green);cursor:pointer;
    list-style:none;display:flex;align-items:center;gap:6px;
    padding:8px 0;border-top:1px solid var(--border);margin-top:4px;
  }
  details summary::-webkit-details-marker{display:none}
  details summary::before{content:'▶';font-size:9px;transition:transform 0.2s;display:inline-block}
  details[open] summary::before{transform:rotate(90deg)}
  details .needs-inner{padding-top:10px}
  .act-card{border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:10px;background:var(--bg);position:relative}
  .act-num{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:10px;letter-spacing:0.05em;text-transform:uppercase}
  .remove-btn{position:absolute;top:10px;left:10px;background:none;border:none;cursor:pointer;font-size:16px;color:#ccc;line-height:1;padding:2px}
  .remove-btn:hover{color:#e24b4a}
  .add-btn{display:flex;align-items:center;gap:7px;width:100%;padding:10px 14px;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;font-family:'Heebo',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s;margin-bottom:1rem}
  .add-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}
  .add-icon{width:18px;height:18px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:background 0.15s}
  .add-btn:hover .add-icon{background:var(--green);color:#fff}
  .submit-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s}
  .submit-btn:hover{background:var(--green-dark)}
  .submit-btn:active{transform:scale(0.99)}
  .success{display:none;text-align:center;padding:3rem 1rem}
  .success-circle{width:60px;height:60px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:26px}
  .success h2{font-size:18px;font-weight:600;margin-bottom:8px}
  .success p{font-size:14px;color:var(--muted);margin-bottom:1.5rem}
  .back-btn{padding:10px 24px;background:var(--green-light);color:var(--green-dark);border:none;border-radius:var(--radius);font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
  .back-btn:hover{background:#c5ead9}
  .config-notice{background:var(--green-light);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--green-dark);margin-bottom:1.5rem;display:none}
  .config-notice.show{display:block}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="week-badge" id="week-badge">שבוע קדימה</div>
    <h1>דיווח פעילויות שבועי</h1>
    <p class="subtitle" id="week-sub">פעילויות פוליטיות וציבוריות לשבוע הבא</p>
  </div>

  <div id="form-area">
    <div class="config-notice" id="cfg-notice">שים לב: Web App URL לא הוגדר — הנתונים יישמרו מקומית בלבד.</div>

    <div class="card">
      <div class="field">
        <label>שם התא</label>
        <select id="cell-select">
          <option value="">— בחר תא —</option>
          <option>העברית</option><option>בצלאל</option><option>בן גוריון</option>
          <option>תל אביב</option><option>ספיר</option><option>טכניון</option><option>עמק יזרעאל</option>
        </select>
      </div>
    </div>

    <div id="activities-list"></div>

    <button class="add-btn" onclick="addActivity()">
      <span class="add-icon">+</span>
      הוספת פעילות
    </button>

    <button class="submit-btn" onclick="submitForm()">שליחה ←</button>
  </div>

  <div class="success" id="success-area">
    <div class="success-circle">✓</div>
    <h2 id="success-title">נשלח בהצלחה</h2>
    <p id="success-sub">הפעילויות נרשמו לשבוע הבא</p>
    <button class="back-btn" onclick="resetForm()">הזנה נוספת</button>
  </div>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwuMCfyRuBuBkb2EGI8EWnSkHywus1sAp3ioHI6Kbh8IH7BvG2jtmfoQNaKK-x84fNL/exec';
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function initWeek(){
  const d = new Date(), day = d.getDay();
  const diff = day === 0 ? 0 : 7 - day;
  const s = new Date(d); s.setDate(d.getDate() + diff);
  const e = new Date(s); e.setDate(s.getDate() + 6);
  const fmt = x => x.toLocaleDateString('he-IL',{day:'numeric',month:'long'});
  document.getElementById('week-badge').textContent = 'שבוע ' + fmt(s) + ' — ' + fmt(e);
  document.getElementById('week-sub').textContent = 'מלא את הפעילויות לשבוע ' + fmt(s);
  if(!WEBAPP_URL) document.getElementById('cfg-notice').classList.add('show');
}

let actCount = 0;
function addActivity(data){
  actCount++;
  const id = 'act_' + actCount;
  const el = document.createElement('div');
  el.id = id; el.className = 'act-card';
  el.innerHTML = `
    <button class="remove-btn" onclick="document.getElementById('${id}').remove()" title="הסרה">×</button>
    <div class="act-num">פעילות ${actCount}</div>
    <div class="field"><label>שם הפעילות *</label>
      <input type="text" class="act-title" placeholder="שיח פתוח / הרצאה / הפגנה / ערב תרבות..." value="${esc(data?.title||'')}"></div>
    <div class="field"><label>תיאור קצר</label>
      <textarea class="act-desc" placeholder="פרטים נוספים...">${esc(data?.desc||'')}</textarea></div>
    <div class="row2">
      <div class="field"><label>תאריך הפעילות</label>
        <input type="date" class="act-date" value="${esc(data?.date||'')}" min="${new Date().toISOString().split('T')[0]}"></div>
      <div class="field"><label>שעה</label>
        <input type="text" class="act-time" placeholder="18:00" value="${esc(data?.time||'')}"></div>
    </div>
    <div class="field"><label>מיקום</label>
      <input type="text" class="act-location" placeholder="קמפוס / רחוב / זום" value="${esc(data?.location||'')}"></div>
    <details>
      <summary>צרכים ומשאבים</summary>
      <div class="needs-inner">
        <textarea class="act-needs" placeholder="ציוד, תקציב, עזרה נדרשת...">${esc(data?.needs||'')}</textarea>
      </div>
    </details>`;
  document.getElementById('activities-list').appendChild(el);
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function clearForm(){
  document.getElementById('cell-select').value = '';
  document.getElementById('activities-list').innerHTML = '';
  actCount = 0;
}
function resetForm(){
  clearForm();
  document.getElementById('form-area').style.display = 'block';
  document.getElementById('success-area').style.display = 'none';
}

function getFormData(){
  const cell = document.getElementById('cell-select').value;
  if(!cell){ alert('נא לבחור תא'); return null; }
  const cards = document.querySelectorAll('#activities-list .act-card');
  if(!cards.length){ alert('נא להוסיף לפחות פעילות אחת'); return null; }
  const acts = [];
  for(const c of cards){
    const title = c.querySelector('.act-title').value.trim();
    if(!title){ alert('נא למלא שם לכל הפעילויות'); return null; }
    const dateVal = c.querySelector('.act-date').value;
    if(!dateVal){ alert('נא לבחור תאריך לכל הפעילויות'); return null; }
    const dateObj = new Date(dateVal);
    const dayNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    const dayName = dayNames[dateObj.getDay()];
    const dateFormatted = dateObj.toLocaleDateString('he-IL',{day:'numeric',month:'numeric',year:'numeric'});
    acts.push({
      cell, title,
      desc: c.querySelector('.act-desc').value.trim(),
      date: dateVal,
      dateFormatted,
      day: dayName,
      time: c.querySelector('.act-time').value.trim(),
      location: c.querySelector('.act-location').value.trim(),
      needs: c.querySelector('.act-needs').value.trim(),
      reported: new Date().toLocaleDateString('he-IL')
    });
  }
  return acts;
}

async function submitForm(){
  const data = getFormData();
  if(!data) return;
  const btn = document.querySelector('.submit-btn');
  btn.textContent = 'שולח...'; btn.disabled = true;
  const url = localStorage.getItem('taim_webapp_url');
  if(url){
    try{ await fetch(url, {method:'POST', body:JSON.stringify(data)}); }catch(e){}
  }
  const stored = JSON.parse(localStorage.getItem('taim_events')||'[]');
  stored.push(...data);
  localStorage.setItem('taim_events', JSON.stringify(stored));
  btn.textContent = 'שליחה ←'; btn.disabled = false;
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('success-area').style.display = 'block';
  const cell = data[0].cell;
  document.getElementById('success-title').textContent = 'תא ' + cell + ' — נשלח בהצלחה';
  document.getElementById('success-sub').textContent = data.length + ' פעילות' + (data.length===1?'':'ות') + ' נרשמו לשבוע הבא';
}

initWeek();
addActivity();
</script>
</body>
</html>
